<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="Favicon EM">
  <defs>
    <linearGradient id="letterLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#d9d9d9" />
    </linearGradient>
    <filter id="letterDepth" x="-35%" y="-35%" width="170%" height="170%" color-interpolation-filters="sRGB">
      <feDropShadow dx="1.2" dy="1.8" stdDeviation="0.7" flood-color="#000000" flood-opacity="0.88" />
      <feDropShadow dx="2.8" dy="3.8" stdDeviation="0.9" flood-color="#000000" flood-opacity="0.62" />
    </filter>
  </defs>
  <g transform="translate(32 34) rotate(-10) skewX(-10)">
    <g fill="#3d3d3d" font-size="34" font-weight="700" font-family="'Space Grotesk', 'Segoe UI', sans-serif">
      <text x="-12" y="12" text-anchor="middle">E</text>
      <text x="14" y="12" text-anchor="middle">M</text>
    </g>
    <g fill="#5d5d5d" font-size="34" font-weight="700" font-family="'Space Grotesk', 'Segoe UI', sans-serif">
      <text x="-13" y="11" text-anchor="middle">E</text>
      <text x="13" y="11" text-anchor="middle">M</text>
    </g>
    <text
      x="-14"
      y="10"
      text-anchor="middle"
      fill="url(#letterLight)"
      font-size="34"
      font-weight="700"
      font-family="'Space Grotesk', 'Segoe UI', sans-serif"
      filter="url(#letterDepth)"
    >
      E
    </text>
    <text
      x="12"
      y="10"
      text-anchor="middle"
      fill="url(#letterLight)"
      font-size="34"
      font-weight="700"
      font-family="'Space Grotesk', 'Segoe UI', sans-serif"
      filter="url(#letterDepth)"
    >
      M
    </text>
  </g>
</svg>